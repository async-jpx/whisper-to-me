<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>whisper-to-me</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="daemon-down" class="daemon-down" hidden>
    <div class="daemon-down-card">
      <h1>whisper-to-me</h1>
      <p>Can't reach the local daemon.</p>
      <p class="hint">Start it with <code>wtm ui</code>, then this page will pick up automatically.</p>
      <p class="retrying">Retrying&hellip;</p>
    </div>
  </div>

  <div id="app" class="app" hidden>
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="brand">whisper-to-me</span>
      </div>
      <div class="sidebar-search">
        <input id="search-input" type="search" placeholder="Search notes…" autocomplete="off">
      </div>
      <ul id="notes-list" class="notes-list"></ul>
    </aside>

    <main class="main">
      <div class="session-bar">
        <div class="status">
          <span id="status-dot" class="status-dot status-idle"></span>
          <span id="status-text" class="status-text">Ready</span>
          <span id="elapsed" class="elapsed"></span>
        </div>
        <div class="controls">
          <input id="title-input" type="text" class="title-input" placeholder="Meeting title (optional)" maxlength="120">
          <button id="watch-btn" class="btn btn-ghost">Watch</button>
          <button id="record-btn" class="btn btn-primary">Record</button>
        </div>
      </div>

      <div id="content" class="content">
        <div id="empty-state" class="empty-state">
          <p>Select a note from the sidebar, or start a recording.</p>
        </div>
        <div id="transcript" class="transcript" hidden></div>
        <div id="note-container" class="note-container" hidden>
          <div class="note-toolbar">
            <span id="view-actions">
              <button id="edit-btn" class="btn btn-ghost btn-sm">Edit</button>
              <button id="copy-btn" class="btn btn-ghost btn-sm">Copy</button>
            </span>
            <span id="edit-actions" hidden>
              <button id="save-btn" class="btn btn-primary btn-sm">Save</button>
              <button id="cancel-btn" class="btn btn-ghost btn-sm">Cancel</button>
            </span>
          </div>
          <article id="note-view" class="note-view"></article>
          <textarea id="note-editor" class="note-editor" spellcheck="false" hidden></textarea>
        </div>
      </div>
    </main>
  </div>

  <div id="toasts" class="toasts" aria-live="polite"></div>

  <script src="/static/vendor/markdown-it.min.js"></script>
  <script src="/static/vendor/markdown-it-task-lists.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
