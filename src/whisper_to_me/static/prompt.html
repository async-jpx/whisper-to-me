<!doctype html>
<!-- Meeting-prompt widget: a tiny page the desktop shell shows in a small
     always-on-top window when the daemon detects a meeting (state
     "prompting"). Served by the local daemon, so the fetches below are
     same-origin loopback calls; no external assets, ever. -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Meeting detected</title>
<style>
  :root {
    --bg: #fff; --text: #37352f; --text-secondary: #787774;
    --border: #e9e9e7; --accent: #2383e2; --danger: #eb5757;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #191919; --text: #d4d4d4; --text-secondary: #9b9b9b;
      --border: #2f2f2f;
    }
  }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 14px/1.45 -apple-system, "SF Pro Text", sans-serif;
    display: flex; flex-direction: column; justify-content: center;
    padding: 12px 16px; box-sizing: border-box;
    border: 1px solid var(--border); border-radius: 12px;
    -webkit-user-select: none; user-select: none; cursor: default;
    overflow: hidden;
  }
  .head {
    display: flex; align-items: center; gap: 7px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
    text-transform: uppercase; color: var(--text-secondary);
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
    animation: pulse 0.9s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(35, 131, 226, 0.4); }
    70% { box-shadow: 0 0 0 6px rgba(35, 131, 226, 0); }
  }
  #title {
    margin: 6px 0 10px; font-weight: 600; font-size: 15px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .actions { display: flex; justify-content: flex-end; gap: 8px; }
  button {
    font: inherit; font-size: 13px; font-weight: 500;
    border-radius: 6px; padding: 5px 14px; cursor: pointer;
    border: 1px solid var(--border); background: transparent; color: var(--text);
  }
  button.primary {
    background: var(--danger); border-color: var(--danger); color: #fff;
    display: inline-flex; align-items: center; gap: 6px;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  .rec { width: 8px; height: 8px; border-radius: 50%; background: #fff; }
</style>
</head>
<body>
  <div class="head"><span class="dot"></span><span>Meeting detected</span></div>
  <div id="title">Meeting</div>
  <div class="actions">
    <button id="ignore">Ignore</button>
    <button id="record" class="primary"><span class="rec"></span><span>Record</span></button>
  </div>
<script>
"use strict";
(function () {
  const titleEl = document.getElementById("title");
  const recordBtn = document.getElementById("record");
  const ignoreBtn = document.getElementById("ignore");

  function apply(status) {
    if (status.state === "prompting") {
      titleEl.textContent = status.title || "Meeting";
      recordBtn.disabled = ignoreBtn.disabled = false;
    }
    // Any other state: the desktop shell hides this window; nothing to do.
  }

  async function respond(accept) {
    recordBtn.disabled = ignoreBtn.disabled = true;
    try {
      await fetch("/api/watch/respond", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ accept }),
      });
    } catch (err) {
      recordBtn.disabled = ignoreBtn.disabled = false;
    }
  }
  recordBtn.addEventListener("click", () => respond(true));
  ignoreBtn.addEventListener("click", () => respond(false));

  fetch("/api/status").then((r) => r.json()).then(apply).catch(() => {});

  // Follow status events so a prompt that changes (or a reconnect) stays
  // accurate even while the window is visible.
  function connect() {
    const ws = new WebSocket(`ws://${location.host}/api/events`);
    ws.addEventListener("message", (msg) => {
      try {
        const evt = JSON.parse(msg.data);
        if (evt.type === "status") apply(evt);
      } catch (err) { /* ignore malformed frames */ }
    });
    ws.addEventListener("close", () => setTimeout(connect, 2000));
    ws.addEventListener("error", () => ws.close());
  }
  connect();
})();
</script>
</body>
</html>
