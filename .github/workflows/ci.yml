name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    # whisper-to-me is macOS-only (CLAUDE.md): watch.py loads CoreAudio at
    # import time, so the full test suite can only be collected/run on macOS.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff check)
        run: uv run ruff check src/

      - name: Format (ruff format --check)
        # Non-blocking: the codebase predates `ruff format`; surface drift
        # without failing the build.
        continue-on-error: true
        run: uv run ruff format --check src/ tests/

      - name: Build (uv build)
        run: uv build

      - name: Tests (pytest)
        run: uv run pytest tests/
